name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Ruff (lint)
        run: python -m ruff check .
      - name: Ruff (format)
        run: python -m ruff format --check .
      - name: Mypy
        run: python -m mypy
      - name: Pytest
        run: python -m pytest -q

  install-from-git:
    name: Install from checkout (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Version sync (package.json vs aimem.__version__)
        run: python scripts/check_version_sync.py
      - name: pip install from checkout
        run: python -m pip install .
      - name: aimem CLI smoke test
        run: aimem --version
      - name: Node launcher smoke test
        run: node bin/aimem.js --version
